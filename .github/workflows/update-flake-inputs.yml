name: Update flake inputs

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update claude-code-nix
        run: nix flake update claude-code-nix

      - name: Update codex-cli-nix
        run: nix flake update codex-cli-nix

      - name: Update llm-agents.nix
        run: nix flake update llm-agents

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "flake: update claude-code-nix, codex-cli-nix, and llm-agents.nix inputs"
          title: "flake: update claude-code-nix, codex-cli-nix, and llm-agents.nix inputs"
          body: |
            Automated daily update of flake inputs:
            - `claude-code-nix`
            - `codex-cli-nix`
            - `llm-agents.nix`
          branch: auto-update-flake-inputs
          delete-branch: true

  smoke-test:
    needs: update
    if: needs.update.outputs.pull-request-number
    uses: ./.github/workflows/ci.yml
